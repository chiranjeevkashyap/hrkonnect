spring.application.name=hrkonnect
spring.main.banner-mode=off
# spring.profiles.active=dev
# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/leave_management
spring.datasource.username=postgres
spring.datasource.password=Anonymous@1805

spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQLDialect does not need to be specified explicitly using 'hibernate.dialect' (remove the property setting and it will be selected by default)
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# SQL INITIALIZATION
# ===============================
#spring.sql.init.mode=always
#spring.jpa.defer-datasource-initialization=true

# Optional Explicit Configuration (If you want custom SQL file names or locations)
# spring.sql.init.data-locations=classpath:data.sql
